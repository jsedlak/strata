name: Publish Packages

on:
  workflow_dispatch: # Allow running the workflow manually from the GitHub UI
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write # Required for NuGet Trusted Publishing (OIDC token issuance)

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Get next version
        uses: reecetech/version-increment@2023.9.3
        id: version
        with:
          scheme: semver
          increment: patch

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Pack Strata
        run: >-
          dotnet pack src/Strata/Strata.csproj
          --configuration Release
          -p:Version=${{ steps.version.outputs.version }}
          --output ${{ runner.temp }}/packages

      # Exchange the GitHub OIDC token for a short-lived nuget.org API key.
      # Requires a Trusted Publishing policy on nuget.org for this repo + workflow.
      - name: NuGet login (OIDC -> temp API key)
        uses: NuGet/login@v1
        id: login
        with:
          user: jsedlak # nuget.org username (profile name); swap for ${{ secrets.NUGET_USER }} if preferred

      - name: Publish Strata
        run: >-
          dotnet nuget push ${{ runner.temp }}/packages/*.nupkg
          --api-key ${{ steps.login.outputs.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate
